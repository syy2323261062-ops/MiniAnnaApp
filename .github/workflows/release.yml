name: Release Executa binaries

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v0.1.0-rc.1"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-app:
    name: Validate App and offline Sampling
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install exact npm dependencies
        run: npm ci

      - name: Build App bundle
        run: npm run build

      - name: Strictly validate App manifest
        run: npm run validate

      - name: Check fixed identities
        run: npm run check:identity

      - name: Reject direct frontend LLM calls
        run: npm run check:no-direct-llm

      - name: Test RPC log sanitizer
        run: npm run test:sanitize

      - name: Run offline protocol smoke
        run: npm run test:protocol

      - name: Run CLI mock Sampling integration
        run: npm run executa:mock

  build:
    name: Build ${{ matrix.platform }}
    needs: validate-app
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
            archive_ext: tar.gz
          - os: macos-15-intel
            platform: darwin-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows-x86_64
            archive_ext: zip

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install Executa test and build dependencies
        run: >-
          uv sync --python 3.12
          --project executas/mini-notes-summary-python
          --extra test --extra build

      - name: Run Executa pytest suite
        run: npm run test:executa

      - name: Check fixed identities
        run: npm run check:identity

      - name: Build onefile binary and archive
        run: >-
          uv run --python 3.12 python scripts/build_binary.py
          --platform ${{ matrix.platform }}

      - name: Smoke native binary
        run: >-
          uv run --python 3.12 python scripts/smoke_binary.py
          --binary dist/staging/${{ matrix.platform }}/bin/${{ matrix.platform == 'windows-x86_64' && 'mini-notes-summary.exe' || 'mini-notes-summary' }}

      - name: Verify native archive
        run: >-
          uv run --python 3.12 python scripts/verify_archive.py
          dist/release/mini-notes-summary-${{ matrix.platform }}.${{ matrix.archive_ext }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mini-notes-summary-${{ matrix.platform }}
          path: dist/release/mini-notes-summary-${{ matrix.platform }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish three release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mini-notes-summary-*
          path: dist/release
          merge-multiple: true

      - name: Require the exact three release assets
        shell: bash
        run: |
          expected="$(printf '%s\n' \
            mini-notes-summary-darwin-arm64.tar.gz \
            mini-notes-summary-darwin-x86_64.tar.gz \
            mini-notes-summary-windows-x86_64.zip | sort)"
          actual="$(find dist/release -maxdepth 1 -type f -printf '%f\n' | sort)"
          test "$actual" = "$expected"

      - name: Select release tag
        id: release_tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$REQUESTED_TAG"
            if [[ -z "$tag" ]]; then
              echo "workflow_dispatch requires release_tag" >&2
              exit 1
            fi
            if [[ "$tag" != *-* ]]; then
              echo "workflow_dispatch may only publish a prerelease tag" >&2
              exit 1
            fi
          else
            tag="$REF_NAME"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/release/mini-notes-summary-darwin-arm64.tar.gz
            dist/release/mini-notes-summary-darwin-x86_64.tar.gz
            dist/release/mini-notes-summary-windows-x86_64.zip
